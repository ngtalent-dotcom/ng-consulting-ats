name: Spellcheck

on:
  push:
    paths:
      - 'src/**/*.jsx'
      - 'src/**/*.js'
      - 'cspell.json'
  pull_request:
    paths:
      - 'src/**/*.jsx'
      - 'src/**/*.js'
      - 'cspell.json'

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run spellcheck
